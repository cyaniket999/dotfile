#################################
#           General             #
#################################
backend = "glx";
vsync = true;
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

#################################
#          Animations           #
#################################
animations = true;
animation-stiffness = 200.0;
animation-dampening = 18.0; # Slightly higher to make 'zoom' feel more premium
animation-clamping = true;
animation-mass = 1.0;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "zoom";
animation-for-workspace-switch-out = "zoom";

#################################
#        Transparency           #
#################################
active-opacity = 0.90;
inactive-opacity = 0.80;
inactive-dim = 0.15;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'chromium'",
  "100:class_g = 'Chromium'",
  "100:class_g = 'mpv'",
  "80:class_g = 'pcmanfm'"
];

#################################
#             Blur              #
#################################
blur: {
  method = "none";
  strength = 7;
  background = true;
  background-frame = false;
  background-fixed = false;
}


blur-exclude = [
  "class_g = 'chromium'",
  "class_g = 'mpv'"
];

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Chromium'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#             Shadows           #
#################################
shadow = false;
shadow-radius = 40;
shadow-opacity = 0.35;
shadow-offset-x = -30;
shadow-offset-y = -25;
shadow-color = "#000000";

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "class_g = 'Plank'",
  "class_g = 'Chromium'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Corners             #
#################################
corner-radius = 12;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

##notifications##
wintypes:
{
  notification = { fade = true; shadow = true; opacity = 1.0; focus = true; full-shadow = false; };
};