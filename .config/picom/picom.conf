
#################################
#           General             #
#################################
backend = "glx";
vsync = true;
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

#################################
#          Animations           #
#################################
animations = true;
animation-stiffness = 200.0;
animation-dampening = 18.0; # Slightly higher to make 'zoom' feel more premium
animation-clamping = true;
animation-mass = 1.0;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "zoom";
animation-for-workspace-switch-out = "zoom";

animation-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'Rofi'"
];

#################################
#        Fade                   #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

fade-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'mpv'",
  "class_g = 'Chromium'",
  "name = 'Notification'",
  "_GTK_FRAME_EXTENTS@:c" # Important: Prevents double-fading on GTK header bars
];

#################################
#        Transparency           #
#################################
active-opacity = 0.90;
inactive-opacity = 0.80;
inactive-dim = 0.15;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'Chromium' || class_g = 'chromium'",
  "100:class_g = 'mpv'",
  "100:focused",         # Optional: Force focused window to be opaque
  "80:class_g = 'pcmanfm'"
];

focus-exclude = [
    "class_g = 'mpv'",
    "class_g = 'chromium'",
    "class_g = 'Chromium'",
    "class_g = 'brave-browser'",
    "_GTK_FRAME_EXTENTS@:c"
];

#################################
#             Blur              #
#################################
blur: {
  method = "none";
  strength = 7;
  background = true;
  background-frame = false;
  background-fixed = false;
}


blur-exclude = [
  "class_g = 'chromium'",
  "class_g = 'mpv'"
];

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Chromium'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#             Shadows           #
#################################
shadow = false;
shadow-radius = 12;
shadow-opacity = 0.5;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-color = "#000000";

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "class_g = 'Plank'",
  "class_g = 'Chromium'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Corners             #
#################################
corner-radius = 12;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#           Notification       #
#################################
wintypes:
{
  notification = { fade = true; shadow = true; opacity = 1.0; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
};